version: '3.8'

services:
  # ── Inferencia TabNet (post-clasificación, sábado) ──────────────────────────
  # Uso: docker compose run tabnet-predictor python predict.py --round N --no-upload
  tabnet-predictor:
    build: .
    image: f1-tabnet:latest
    env_file:
      - .env
    volumes:
      - ./f1-winner-predictor/models:/app/models          # modelos .zip y scaler
      - ./f1-winner-predictor/data:/app/data              # datos crudos y procesados
      - ./f1-winner-predictor/.fastf1_cache:/app/.fastf1_cache  # caché FastF1
      - ./f1-winner-predictor/.google_credentials.json:/app/.google_credentials.json:ro
    command: python predict.py --help

  # ── Entrenamiento (XGBoost + TabNet) ────────────────────────────────────────
  # Uso: docker compose run trainer
  # Añadir --upload-s3 para subir los artefactos XGBoost a S3
  # Añadir --optimize [--n-trials N] para buscar HPs óptimos con Optuna antes de entrenar
  trainer:
    build: .
    image: f1-tabnet:latest
    env_file:
      - .env
    volumes:
      - ./f1-winner-predictor/models:/app/models
      - ./f1-winner-predictor/data:/app/data
      - ./f1-winner-predictor/.fastf1_cache:/app/.fastf1_cache
      - ./f1-winner-predictor/.google_credentials.json:/app/.google_credentials.json:ro
    command: python train.py